version: "3.8"

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:latest
    container_name: forgejo
    restart: unless-stopped
    ports:
      - "3000:3000"   # web UI
      - "222:22"      # optional SSH git access
    volumes:
      - ./data:/data
    environment:
      - USER_UID=1000
      - USER_GID=1000